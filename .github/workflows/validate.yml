name: EBE — Validação
# Corre em cada push/PR para validar estrutura do currículo e estado.
on:
  push:
    branches: ["main", "arena/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff
          pip install -e .

      - name: Lint com ruff
        run: ruff check src/ tools/ || echo "ruff: avisos (não bloqueante)"

      - name: Validar curriculum.json
        run: |
          PYTHONPATH=src python -c "
          import json
          from ebe.curriculum.validator import validate_or_raise
          d = json.load(open('state/curriculum.json'))
          validate_or_raise(d, expected_total=1029)
          print('curriculum.json válido (1029 apostilas)')
          "

      - name: Testar o DocumentBuilder com conteúdo de demonstração
        run: PYTHONPATH=src python tools/test_docx_engine.py

      - name: Autodiagnóstico
        run: PYTHONPATH=src python -m ebe diag
